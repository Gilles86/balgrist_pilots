name: balgrist_pilots
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  # Scientific stack
  - numpy
  - scipy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn
  - jupyterlab
  - ipykernel
  - ipywidgets
  # Neuroimaging
  - nibabel
  - nilearn
  - nipype
  - pip:
      # Keras 3 + TF for braincoder
      - tensorflow==2.20.0
      - tensorflow-probability==0.25.0
      - tf-keras
      - keras==3.13.2
      # Braincoder (keras-backend branch — same as abstract_values)
      - git+https://github.com/Gilles86/braincoder.git@keras-backend
      - pybids
      - tqdm
      - -e .
